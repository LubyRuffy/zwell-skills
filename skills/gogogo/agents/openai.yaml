interface:
  display_name: "GoGoGo"
  short_description: "同步 main、查根因、过审查后直推的闭环模式"
  default_prompt: "Use $gogogo to run the following request end to end: create or reuse an issue, sync local main before code changes, prove the root cause, avoid hardcoded symptom fixes, pass a pre-commit review gate, then merge back to main and push/deploy from main unless I explicitly ask for a PR flow."
