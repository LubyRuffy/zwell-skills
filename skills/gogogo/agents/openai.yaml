interface:
  display_name: "GoGoGo"
  short_description: "把后续请求切到本地并回 main 后直推的闭环执行模式"
  default_prompt: "Use $gogogo to treat the following request as a single-developer full lifecycle workflow: create or reuse an issue, allow local temporary branches when useful, but merge back to local main before push and then commit/push/deploy only from main unless the user explicitly asks for a PR flow."
